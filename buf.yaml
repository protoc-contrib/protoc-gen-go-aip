version: v2

# Single-module workspace. The public field-options module's root is the
# repo root, so the file ships to BSR as `protoc_contrib/aip/query.proto`
# — consumers import it by that path. The testpb trees under
# internal/generator/{resource,query,fieldmask}/testpb are excluded;
# they exist only to exercise the generators.
#
# To regenerate testpb fixtures: comment out the `excludes` block below,
# run `buf generate`, and restore the block. (Same workflow as the
# sibling protoc-contrib plugins.)
modules:
  - path: .
    name: buf.build/protoc-contrib/protoc-gen-go-aip
    excludes:
      - internal/generator/resource/testpb
      - internal/generator/query/testpb
      - internal/generator/fieldmask/testpb

deps:
  - buf.build/googleapis/googleapis

lint:
  use:
    - BASIC
  except:
    # Fixture packages intentionally use the plain "tests.*" style rather
    # than a versioned package suffix.
    - PACKAGE_VERSION_SUFFIX
    - PACKAGE_DIRECTORY_MATCH
    # reference.proto imports simple/external so the Go generator can see
    # their resource types at codegen time, even though the imports aren't
    # referenced in the proto syntax.
    - IMPORT_USED
breaking:
  use:
    - FILE
