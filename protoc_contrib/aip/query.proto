// Field option consumed by protoc-gen-go-aip to drive AIP query codegen.
//
// Annotate a request field with `(protoc_contrib.aip.field_reference)`
// pointing at a resource type and the subset of its fields exposed in
// that context. The carrying field's name determines what the plugin
// emits:
//
//   filter   (string, AIP-160) → {Request}FilterDeclarations + ParseFilter
//   order_by (string, AIP-132) → {Request}OrderByFields      + ParseOrderBy
//
// Other field names are reserved for future contexts (read_mask,
// update_mask, …) and are silently ignored today.
syntax = "proto3";

package protoc_contrib.aip;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/protoc-contrib/protoc-gen-go-aip/protoc_contrib/aip;aip";

// FieldReference points at a subset of a resource's fields. The carrying
// field's name decides how the plugin interprets the list (see file
// header).
message FieldReference {
  // AIP resource type, e.g. "library.googleapis.com/Book". Must match
  // the `type` value of a `(google.api.resource)` annotation on a
  // message in the compilation unit.
  string type = 1;

  // Names of fields on the referenced resource exposed in this context.
  repeated string fields = 2;
}

extend google.protobuf.FieldOptions {
  FieldReference field_reference = 50001;
}
