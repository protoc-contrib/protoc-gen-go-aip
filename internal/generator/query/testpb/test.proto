// Test fixture for protoc-gen-go-aip query pass. The Book resource is
// referenced by ListBooksRequest's `filter` and `order_by` fields via
// `(protoc_contrib.aip.field_reference)`. Filter exercises every
// supported CEL type (TypeString, TypeInt, TypeBool, TypeEnum,
// TypeTimestamp); order_by exercises a subset of orderable paths.
//
// Regenerate: remove the internal/generator/query/testpb exclude from
// buf.yaml, run `buf generate`, restore the exclude.
syntax = "proto3";

package testpb;

import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";
import "protoc_contrib/aip/query.proto";

option go_package = "github.com/protoc-contrib/protoc-gen-go-aip/internal/generator/query/testpb;testpb";

enum Genre {
  GENRE_UNSPECIFIED = 0;
  GENRE_FICTION = 1;
  GENRE_NONFICTION = 2;
}

message Book {
  option (google.api.resource) = {
    type: "testpb/Book"
    pattern: "books/{book}"
    plural: "books"
    singular: "book"
  };

  string name = 1;
  string title = 2;
  string author = 3;
  int64 read_count = 4;
  bool published = 5;
  Genre genre = 6;
  google.protobuf.Timestamp create_time = 7;
}

message ListBooksRequest {
  int32 page_size = 1;
  string page_token = 2;
  string filter = 3 [(protoc_contrib.aip.field_reference) = {
    type: "testpb/Book"
    fields: ["title", "author", "read_count", "published", "genre", "create_time"]
  }];
  string order_by = 4 [(protoc_contrib.aip.field_reference) = {
    type: "testpb/Book"
    fields: ["title", "create_time"]
  }];
}

message ListBooksResponse {
  repeated Book books = 1;
  string next_page_token = 2;
}
